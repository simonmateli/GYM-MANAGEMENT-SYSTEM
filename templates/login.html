<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymHub | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e1e2f 0%, #2d2d44 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            padding: 12px;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            box-shadow: none;
            border: 1px solid #0d6efd;
        }
        .btn-login {
            background: #0d6efd;
            border: none;
            padding: 12px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-login:hover {
            background: #0b5ed7;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <i class="fas fa-dumbbell fa-3x mb-3 text-primary"></i>
        <h2 class="fw-bold">GYMHUB</h2>
        <p class="text-muted small">Enter your credentials to access your dashboard</p>
    </div>

    <form action="/login" method="POST">
        <div class="mb-3">
            <label class="form-label small">Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
        </div>
        <div class="mb-3">
            <label class="form-label small">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <div class="mb-3">
            <label class="form-label small">Role</label>
            <select name="user_type" class="form-select" required>
                <option value="member">Member</option>
                <option value="trainer">Trainer</option>
                <option value="admin">Administrator</option>
            </select>
        </div>
        <div class="mb-4 form-check">
            <input type="checkbox" class="form-check-input" id="remember">
            <label class="form-check-label small" for="remember">Remember me</label>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-login">SIGN IN</button>
    </form>

    <div class="text-center mt-4">
        <p class="small text-muted">Don't have an account? <a href="/register" class="text-primary text-decoration-none">Register</a></p>
        <a href="/" class="small text-muted text-decoration-none"><i class="fas fa-arrow-left me-1"></i> Back to Home</a>
    </div>
</div>

<!-- In login.html footer, add trainer registration link -->
<div class="login-link">
    <a href="{{ url_for('trainer_register') }}" class="btn btn-outline-light btn-sm mt-3">
        <i class="fas fa-user-tie me-1"></i>Register as Trainer
    </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
